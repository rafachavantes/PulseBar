version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types: ["patch", "minor"]

  - package-ecosystem: npm
    directory: /apps/desktop-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types: ["patch", "minor"]
